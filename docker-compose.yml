services:

  backend:

    build:
      context: ./backend

    container_name: pdf-rag-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

    volumes:
      - ./backend:/app
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/chroma_db:/app/data/chroma_db

    restart: unless-stopped

  